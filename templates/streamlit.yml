name: "Streamlit Data Apps"
slug: "streamlit"
description: "Interactive Python data apps and dashboards — turn analysis into shareable web apps"
long_description: |
  Deploy interactive Python data applications instantly with Streamlit.
  Perfect for turning Jupyter notebooks into shareable web apps, building
  ML model demos, and creating interactive teaching materials.

  Includes:
  - Python 3.11 with a pre-built virtual environment
  - Streamlit + pandas, numpy, plotly, scikit-learn, seaborn
  - Demo app at ~/apps/demo.py ready to run on port 8501
  - Streamlit service starts automatically on boot

author: "Prism Team"
version: "1.0.0"
base: "ubuntu-24.04"
connection_type: "web"

complexity: "simple"
category: "Research Tools"
domain: "datascience"
icon: "🌊"
color: "#ff4b4b"
popular: true

package_manager: "apt"
packages:
  system:
    - python3
    - python3-pip
    - python3-venv
    - python3-dev
    - git
    - curl
    - htop

users:
  - name: "researcher"
    groups: ["sudo"]
    shell: "/bin/bash"

services:
  - name: streamlit
    port: 8501
    type: "web"
    start_command: "systemctl start streamlit"
    check_command: "systemctl is-active streamlit"
    enable: true

post_install: |
  #!/bin/bash
  set -e
  export DEBIAN_FRONTEND=noninteractive
  export NEEDRESTART_MODE=a

  echo "🌊 Installing Streamlit environment..."

  sudo -u researcher python3 -m venv /home/researcher/.venv
  /home/researcher/.venv/bin/pip install --upgrade pip --quiet
  /home/researcher/.venv/bin/pip install --quiet \
    streamlit pandas numpy matplotlib seaborn plotly altair scikit-learn requests openpyxl

  mkdir -p /home/researcher/apps
  mkdir -p /home/researcher/.streamlit

  cat > /home/researcher/.streamlit/config.toml << 'CFGEOF'
[server]
headless = true
port = 8501
address = "0.0.0.0"
enableCORS = false
CFGEOF

  cat > /etc/systemd/system/streamlit.service << 'SVCEOF'
[Unit]
Description=Streamlit Data App Server
After=network.target
[Service]
Type=simple
User=researcher
WorkingDirectory=/home/researcher
ExecStart=/home/researcher/.venv/bin/streamlit run /home/researcher/apps/demo.py
Restart=always
RestartSec=5
Environment="HOME=/home/researcher"
SVCEOF

  chown -R researcher:researcher /home/researcher
  systemctl daemon-reload
  systemctl enable streamlit
  systemctl start streamlit

  echo "✅ Streamlit installed! Access at: http://<public-ip>:8501"
  echo "📝 Edit your app: ~/apps/demo.py"

idle_detection:
  enabled: true
  idle_threshold_minutes: 20
  hibernate_threshold_minutes: 60
  check_interval_minutes: 5
  check_processes:
    - "streamlit"
    - "python3"

instance_defaults:
  type: "t3.small"
  ports: [22, 8501]
  root_volume_gb: 20

estimated_launch_time: 5
validation_status: "validated"
tags:
  type: "web-app"
  language: "python"
  interface: "browser"
  purpose: "data-apps"
