name: "OpenRefine Data Cleaning"
slug: "openrefine"
description: "Browser-based data cleaning and transformation for messy research datasets"
long_description: |
  OpenRefine (formerly Google Refine) is a powerful tool for working with
  messy data — cleaning it, transforming it, and reconciling it against
  external sources. Ideal for social scientists, digital humanities
  researchers, and anyone dealing with real-world tabular data.

  Includes:
  - OpenRefine 3.8.2 with 1 GB heap memory
  - OpenJDK 17 runtime
  - Sample CSV dataset to explore the interface
  - Accessible via browser on port 3333
  - Data persisted at ~/openrefine-workspace/

author: "Prism Team"
version: "1.0.0"
base: "ubuntu-24.04"
connection_type: "web"

complexity: "simple"
category: "Research Tools"
domain: "research"
icon: "🔬"
color: "#f96732"
popular: true

package_manager: "apt"
packages:
  system:
    - openjdk-17-jre-headless
    - wget
    - curl
    - python3
    - git
    - htop

users:
  - name: "researcher"
    groups: ["sudo"]
    shell: "/bin/bash"

services:
  - name: openrefine
    port: 3333
    type: "web"
    start_command: "systemctl start openrefine"
    check_command: "systemctl is-active openrefine"
    enable: true

post_install: |
  #!/bin/bash
  set -e
  export DEBIAN_FRONTEND=noninteractive
  export NEEDRESTART_MODE=a

  echo "🔬 Installing OpenRefine..."

  OPENREFINE_VERSION="3.8.2"

  # Download and install OpenRefine
  wget -q "https://github.com/OpenRefine/OpenRefine/releases/download/${OPENREFINE_VERSION}/openrefine-linux-${OPENREFINE_VERSION}.tar.gz" \
    -O /tmp/openrefine.tar.gz
  tar -xzf /tmp/openrefine.tar.gz -C /opt/
  mv /opt/openrefine-${OPENREFINE_VERSION} /opt/openrefine
  rm /tmp/openrefine.tar.gz
  chmod +x /opt/openrefine/refine

  # Create workspace directory
  mkdir -p /home/researcher/openrefine-workspace

  # Create a sample CSV dataset
  cat > /home/researcher/openrefine-workspace/sample-survey.csv << 'CSVEOF'
respondent_id,name,age,country,response_date,satisfaction,comments
1,Alice Johnson,28,United States,2024-01-15,5,Very satisfied
2,Bob Smith,34,UK,2024-01-15,4,Mostly good
3,carol williams,31,canada,2024-01-16,3,Could be better
4,David Brown,45,US,01/17/2024,5,Excellent
5,Eve Davis,29,United Kingdom,2024-01-17,,No comment
6,Frank Miller,52,USA,2024-01-18,4,Good overall
7,Grace Wilson,26,Australia,2024-01-18,2,Disappointed
8,Henry Taylor,38,Canada,2024-01-19,5,Perfect
9,Iris Anderson,33,United States,Jan 20 2024,4,satisfied
10,Jack Thomas,41,uk,2024-01-20,3,Average
CSVEOF

  # Create systemd service
  cat > /etc/systemd/system/openrefine.service << 'SVCEOF'
[Unit]
Description=OpenRefine Data Cleaning Tool
After=network.target

[Service]
Type=simple
User=researcher
WorkingDirectory=/home/researcher
ExecStart=/opt/openrefine/refine -i 0.0.0.0 -p 3333 -d /home/researcher/openrefine-workspace -m 1024m
Restart=always
RestartSec=5
Environment="HOME=/home/researcher"
Environment="JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"

[Install]
WantedBy=multi-user.target
SVCEOF

  # Fix ownership
  chown -R researcher:researcher /home/researcher

  # Enable and start service
  systemctl daemon-reload
  systemctl enable openrefine
  systemctl start openrefine

  echo "✅ OpenRefine installation complete!"
  echo "🔬 Access OpenRefine at: http://<public-ip>:3333"
  echo "📂 Workspace:   ~/openrefine-workspace/"
  echo "📄 Sample data: ~/openrefine-workspace/sample-survey.csv"
  echo "🔄 Restart:     sudo systemctl restart openrefine"

idle_detection:
  enabled: true
  idle_threshold_minutes: 30
  hibernate_threshold_minutes: 120
  check_interval_minutes: 10
  check_processes:
    - "java"

instance_defaults:
  type: "t3.medium"
  ports: [22, 3333]
  root_volume_gb: 20
  estimated_cost_per_hour:
    x86_64: 0.0416

estimated_launch_time: 5
prerequisites:
  - "Basic familiarity with tabular data (CSV/spreadsheets)"
learning_resources:
  - "https://openrefine.org/docs"
  - "https://github.com/OpenRefine/OpenRefine/wiki/External-Resources"

validation_status: "validated"
tags:
  type: "web-app"
  interface: "browser"
  purpose: "data-cleaning"
  domain: "humanities"
