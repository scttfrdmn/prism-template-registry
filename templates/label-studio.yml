name: "Label Studio ML Annotation"
slug: "label-studio"
description: "Browser-based data labeling for ML training sets — images, text, audio, and more"
long_description: |
  Label Studio is an open-source data labeling tool for building ML training
  datasets. Supports image classification, object detection, NLP annotation,
  audio transcription, and custom labeling workflows.

  Includes:
  - Label Studio with SQLite backend (no database setup required)
  - Accessible via browser on port 8090
  - Projects and annotations persisted at ~/label-studio-data/

  Recommended for:
  - Training dataset creation for computer vision and NLP
  - Qualitative data coding in social science research
  - Audio/video annotation for linguistics and media studies

author: "Prism Team"
version: "1.0.0"
base: "ubuntu-24.04"
connection_type: "web"

complexity: "moderate"
category: "Machine Learning"
domain: "ml"
icon: "🏷️"
color: "#f5a623"
popular: true

package_manager: "apt"
packages:
  system:
    - python3
    - python3-pip
    - python3-venv
    - python3-dev
    - git
    - curl
    - htop
    - libpq-dev
    - libxml2-dev
    - libxslt1-dev

users:
  - name: "researcher"
    groups: ["sudo"]
    shell: "/bin/bash"

services:
  - name: label-studio
    port: 8090
    type: "web"
    start_command: "systemctl start label-studio"
    check_command: "systemctl is-active label-studio"
    enable: true

post_install: |
  #!/bin/bash
  set -e
  export DEBIAN_FRONTEND=noninteractive
  export NEEDRESTART_MODE=a

  echo "🏷️ Installing Label Studio..."

  # Create Python virtual environment
  sudo -u researcher python3 -m venv /home/researcher/.venv
  /home/researcher/.venv/bin/pip install --upgrade pip --quiet
  /home/researcher/.venv/bin/pip install --quiet label-studio

  # Create data directory
  mkdir -p /home/researcher/label-studio-data

  # Create environment file for the service
  cat > /etc/label-studio.env << 'ENVEOF'
LABEL_STUDIO_HOST=0.0.0.0
LABEL_STUDIO_PORT=8090
LABEL_STUDIO_BASE_DATA_DIR=/home/researcher/label-studio-data
LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/home/researcher
ENVEOF

  # Create systemd service
  cat > /etc/systemd/system/label-studio.service << 'SVCEOF'
[Unit]
Description=Label Studio ML Annotation Tool
After=network.target

[Service]
Type=simple
User=researcher
WorkingDirectory=/home/researcher
EnvironmentFile=/etc/label-studio.env
ExecStart=/home/researcher/.venv/bin/label-studio start --no-browser
Restart=always
RestartSec=10
Environment="HOME=/home/researcher"
Environment="PATH=/home/researcher/.venv/bin:/usr/local/bin:/usr/bin:/bin"

[Install]
WantedBy=multi-user.target
SVCEOF

  # Fix ownership
  chown -R researcher:researcher /home/researcher

  # Enable and start service
  systemctl daemon-reload
  systemctl enable label-studio
  systemctl start label-studio

  echo "✅ Label Studio installation complete!"
  echo "🏷️  Access Label Studio at: http://<public-ip>:8090"
  echo "👤 Create your account on first visit"
  echo "📂 Data directory: ~/label-studio-data/"
  echo "🔄 Restart server: sudo systemctl restart label-studio"

idle_detection:
  enabled: true
  idle_threshold_minutes: 30
  hibernate_threshold_minutes: 120
  check_interval_minutes: 10
  check_processes:
    - "label-studio"
    - "python3"

instance_defaults:
  type: "t3.medium"
  ports: [22, 8090]
  root_volume_gb: 40
  estimated_cost_per_hour:
    x86_64: 0.0416

estimated_launch_time: 8
prerequisites:
  - "Basic understanding of machine learning workflows"
learning_resources:
  - "https://labelstud.io/guide/"
  - "https://labelstud.io/templates/"

validation_status: "validated"
tags:
  type: "web-app"
  language: "python"
  interface: "browser"
  purpose: "annotation"
  domain: "ml"
