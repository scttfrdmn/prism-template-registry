name: "R + RStudio Server"
slug: "r-rstudio-server"
description: "R environment with RStudio Server web IDE (inherits from R Base)"
long_description: |
  Builds on R Base to add web-based IDE access.

  Includes everything from R Base, plus:
  - RStudio Server 2026.01.0 (web IDE on port 8787, version customizable)
  - PAM authentication (use system password)
  - Auto-start on boot
  - Multi-user support

  Access RStudio in your browser at: http://your-ip:8787

  Perfect for:
  - Interactive R development
  - Collaborative data analysis
  - Teaching R programming
  - Remote research teams

  For full publishing stack (Quarto, LaTeX), use: r-publishing-stack

author: "Prism Team"
version: "1.0.0"
base: "ubuntu-24.04"

connection_type: "ssh"

complexity: "intermediate"
category: "Research Tools"
domain: "research"

icon: "🖥️"
color: "#276DC3"
popular: true

architecture: "x86_64"

package_manager: "apt"

inherits: ["R Base (Ubuntu 24.04)"]

parameters:
  rstudio_version:
    name: "rstudio_version"
    display_name: "RStudio Server Version"
    description: "RStudio Server version to install"
    type: "choice"
    choices: ["latest", "2026.01.1-403", "2026.01.0-392", "2024.12.1-542", "2024.09.1-394"]
    default: "latest"
    group: "Development Environment"
    order: 1

packages:
  rstudio_deps:
    - "gdebi-core"
    - "psmisc"

services:
  - name: "rstudio-server"
    port: 8787
    type: "web"
    description: "RStudio Server (web-based R IDE)"
    start_command: "sudo systemctl start rstudio-server"
    check_command: "systemctl is-active rstudio-server"

ports:
  - 22
  - 8787

post_install: |
  #!/bin/bash
  set -e

  export DEBIAN_FRONTEND=noninteractive
  export NEEDRESTART_MODE=a

  echo "🔧 Installing RStudio Server layer..."

  apt-get update

  echo "🖥️  Installing RStudio Server..."
  if [ "{{.rstudio_version}}" = "latest" ]; then
    RSTUDIO_VERSION="2026.01.1-403"
  else
    RSTUDIO_VERSION="{{.rstudio_version}}"
  fi
  echo "Installing RStudio Server version: ${RSTUDIO_VERSION}"
  wget https://download2.rstudio.org/server/jammy/amd64/rstudio-server-${RSTUDIO_VERSION}-amd64.deb
  gdebi --non-interactive rstudio-server-${RSTUDIO_VERSION}-amd64.deb
  rm rstudio-server-${RSTUDIO_VERSION}-amd64.deb

  echo "⚙️  Configuring RStudio Server..."
  mkdir -p /etc/rstudio
  cat > /etc/rstudio/rserver.conf <<'RSTUDIO_CONF'
www-address=0.0.0.0
www-port=8787
rsession-which-r=/usr/bin/R
auth-required-user-group=sudo
RSTUDIO_CONF

  systemctl enable rstudio-server
  systemctl start rstudio-server

  # Set password for researcher user (required for RStudio Server PAM authentication)
  RESEARCHER_PASSWORD=$(openssl rand -base64 12)
  echo "researcher:${RESEARCHER_PASSWORD}" | chpasswd
  echo ""
  echo "============================================="
  echo "  RStudio Server Login Credentials"
  echo "  Username: researcher"
  echo "  Password: ${RESEARCHER_PASSWORD}"
  echo "============================================="
  echo ""

  chown researcher:researcher /home/researcher/WELCOME.txt 2>/dev/null || true

  apt-get autoremove -y
  apt-get clean

  echo "✅ RStudio Server layer installation complete!"
  INSTANCE_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || hostname -I | awk '{print $1}')
  echo "🖥️  RStudio Server: http://${INSTANCE_IP}:8787"

idle_detection:
  enabled: true
  idle_threshold_minutes: 30
  check_processes:
    - "R"
    - "rsession"
    - "rstudio"

instance_defaults:
  ports: [22, 8787]
  root_volume_gb: 25

components:
  r_version: "4.4.2"
  rstudio_server_version: "2026.01.1-403"

tags:
  type: "research"
  purpose: "data-science"
  level: "intermediate"
  language: "r"
  layer: "rstudio"
  web_interface: "true"
