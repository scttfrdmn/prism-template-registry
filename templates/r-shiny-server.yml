name: "R Shiny Server"
slug: "r-shiny"
description: "Share R analyses as interactive web apps with Shiny Server — natural companion to RStudio"
long_description: |
  Host interactive R Shiny applications accessible via browser on port 3838.
  Natural companion to the RStudio template for researchers who want to share
  their R analyses as interactive dashboards with colleagues or students.

  Includes:
  - R 4.4+ from CRAN with Shiny, shinydashboard, ggplot2, DT, plotly
  - Shiny Server from Posit (open-source edition)
  - Sample app at /srv/shiny-server/sample-app/
  - All tidyverse packages from the R Base layer

author: "Prism Team"
version: "1.0.0"
base: "ubuntu-24.04"
inherits: ["R Base (Ubuntu 24.04)"]
connection_type: "web"

complexity: "moderate"
category: "Research Tools"
domain: "research"
icon: "📊"
color: "#276DC3"
popular: true

architecture: "x86_64"
package_manager: "apt"

services:
  - name: shiny-server
    port: 3838
    type: "web"
    start_command: "systemctl start shiny-server"
    check_command: "systemctl is-active shiny-server"
    enable: true

post_install: |
  #!/bin/bash
  set -e
  export DEBIAN_FRONTEND=noninteractive
  export NEEDRESTART_MODE=a

  echo "📊 Installing R Shiny Server..."

  Rscript -e "
  options(repos = c(CRAN = 'https://packagemanager.posit.co/cran/__linux__/noble/latest'))
  install.packages(c('shiny', 'shinydashboard', 'shinyWidgets', 'DT', 'plotly', 'bslib'))
  cat('\n✅ Shiny R packages installed\n')
  "

  SHINY_VERSION="1.5.22.1017"
  wget -q "https://download3.rstudio.org/ubuntu-18.04/x86_64/shiny-server-${SHINY_VERSION}-amd64.deb" \
    -O /tmp/shiny-server.deb
  dpkg -i /tmp/shiny-server.deb
  rm /tmp/shiny-server.deb

  cat > /etc/shiny-server/shiny-server.conf << 'CFGEOF'
run_as shiny;

server {
  listen 3838;

  location / {
    site_dir /srv/shiny-server;
    log_dir /var/log/shiny-server;
    directory_index on;
  }
}
CFGEOF

  mkdir -p /srv/shiny-server/sample-app
  cat > /srv/shiny-server/sample-app/app.R << 'APPEOF'
library(shiny)
library(ggplot2)

ui <- fluidPage(
  titlePanel("Prism Shiny Server Demo"),
  sidebarLayout(
    sidebarPanel(
      sliderInput("n", "Number of observations:", min = 10, max = 1000, value = 100),
      selectInput("dist", "Distribution:",
                  choices = c("Normal", "Uniform", "Exponential")),
      hr(),
      helpText("Edit this app: /srv/shiny-server/sample-app/app.R"),
      helpText("Restart: sudo systemctl restart shiny-server")
    ),
    mainPanel(
      plotOutput("distPlot"),
      verbatimTextOutput("summary")
    )
  )
)

server <- function(input, output) {
  data <- reactive({
    switch(input$dist,
      "Normal"      = rnorm(input$n),
      "Uniform"     = runif(input$n),
      "Exponential" = rexp(input$n)
    )
  })
  output$distPlot <- renderPlot({
    ggplot(data.frame(x = data()), aes(x = x)) +
      geom_histogram(fill = "#276DC3", color = "white", bins = 30) +
      labs(title = paste(input$dist, "Distribution (n =", input$n, ")"),
           x = "Value", y = "Count") +
      theme_minimal(base_size = 14)
  })
  output$summary <- renderPrint(summary(data()))
}

shinyApp(ui = ui, server = server)
APPEOF

  chown -R shiny:shiny /srv/shiny-server
  chown -R researcher:researcher /home/researcher

  systemctl enable shiny-server
  systemctl start shiny-server

  echo "✅ Shiny Server installation complete!"
  echo "📊 Access Shiny at: http://<public-ip>:3838"
  echo "📁 Add apps to:    /srv/shiny-server/<app-name>/"
  echo "🔄 Restart server: sudo systemctl restart shiny-server"

idle_detection:
  enabled: true
  idle_threshold_minutes: 20
  hibernate_threshold_minutes: 60
  check_interval_minutes: 5
  check_processes:
    - "R"
    - "shiny-server"

instance_defaults:
  type: "t3.medium"
  ports: [22, 3838]
  root_volume_gb: 30
  estimated_cost_per_hour:
    x86_64: 0.0416

estimated_launch_time: 10
prerequisites:
  - "R programming experience"
  - "Basic Shiny knowledge"
learning_resources:
  - "https://shiny.posit.co/r/getstarted/"
  - "https://mastering-shiny.org"
  - "https://shiny.posit.co/r/gallery/"

validation_status: "validated"
tags:
  type: "web-app"
  language: "r"
  interface: "browser"
  purpose: "dashboards"
